name: Deploy to Hetzner

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: loopbots-hetzner-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PORT: ${{ secrets.HETZNER_PORT }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_PATH: ${{ secrets.HETZNER_PATH }}
        run: |
          set -euo pipefail

          : "${HETZNER_HOST:?Missing HETZNER_HOST secret}"
          : "${HETZNER_SSH_KEY:?Missing HETZNER_SSH_KEY secret}"
          HETZNER_USER="${HETZNER_USER:-root}"
          HETZNER_PORT="${HETZNER_PORT:-22}"
          HETZNER_PATH="${HETZNER_PATH:-/opt/loopbots}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_deploy_key
          chmod 600 ~/.ssh/hetzner_deploy_key
          ssh-keyscan -p "$HETZNER_PORT" "$HETZNER_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/hetzner_deploy_key -p "$HETZNER_PORT" "$HETZNER_USER@$HETZNER_HOST" \
            "LOOPBOTS_APP_DIR='$HETZNER_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          APP_DIR="${LOOPBOTS_APP_DIR:-/opt/loopbots}"
          CONFIG_FILE="/etc/loopbots/config.yaml"

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main

          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "$CONFIG_FILE is missing. Run deploy/setup_hetzner.sh on the server first."
            exit 1
          fi

          if grep -q "YOUR_TELEGRAM" "$CONFIG_FILE"; then
            echo "$CONFIG_FILE still has placeholder Telegram values."
            exit 1
          fi

          if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
            SUDO="sudo"
          else
            SUDO=""
          fi

          $SUDO systemctl restart loopbots
          $SUDO systemctl --no-pager --full status loopbots
          REMOTE
