exchange:
  id: kraken
  enable_rate_limit: true
  sandbox: false
  timeframe: 15m
  candle_limit: 240

telegram:
  bot_token: "PUT_TELEGRAM_BOT_TOKEN_HERE"
  chat_id: "PUT_TELEGRAM_CHAT_ID_HERE"

scheduler:
  interval_minutes: 15
  timezone: America/Los_Angeles

pair_discovery:
  enabled: true
  refresh_minutes: 60
  quote_asset: USDT
  min_quote_volume_usdt: 1250000
  min_last_price: 0.05
  min_volatility_pct: 1.8
  max_volatility_pct: 18.0
  max_pairs: 20
  hot_discovery:
    enabled: true
    auto_add_new: false
    min_quote_volume_usdt: 40000
    min_volatility_pct: 1.8
    max_volatility_pct: 22.0
    ideal_min_volatility_pct: 2.5
    ideal_max_volatility_pct: 12.0
    max_abs_change_pct: 18.0
    max_pairs: 30
    excluded_base_assets:
      - USDT
      - USDC
      - DAI
      - PYUSD
      - EUR
      - USD
      - GBP
      - AUD
      - CAD
      - JPY
      - USDG
      - USDE
      - XAUT
  require_preferred_base_assets: false
  preferred_base_assets:
    - ETH
    - DOGE
    - SOL
    - LTC
    - ALGO
  strategy_watchlist_base_assets:
    - DOGE
    - SOL
    - ETH
    - LTC
    - ALGO
  watchlist_min_quote_volume_usdt: 100000
  watchlist_min_volatility_pct: 1.2
  watchlist_max_volatility_pct: 22.0
  excluded_base_assets:
    - USDT
    - USDC
    - DAI
    - PYUSD
    - EUR
    - USD
    - GBP
    - AUD
    - CAD
    - JPY
    - ADA
    - AVAX
    - BERA
    - XRP
    - XMR

morning_brief:
  enabled: true
  hour: 8
  minute: 0
  timezone: America/Los_Angeles
  headline_count: 3
  state_file: data/morning_brief_state.json
  headline_feed_url: https://www.coindesk.com/arc/outboundfeeds/rss/

paper_tracking:
  enabled: true
  lookback_days: 7
  retention_days: 30

opportunity_paper:
  state_file: data/opportunity_paper_trades.json
  investment_usd: 1000
  starting_balance_usd: 10000
  fee_pct: 0.40

dashboard:
  enabled: true
  host: 127.0.0.1
  port: 3000
  refresh_seconds: 30
  timezone: America/Los_Angeles

status_report:
  enabled: true
  hour: 20
  minute: 0
  timezone: America/Los_Angeles
  state_file: data/status_report_state.json

adaptive_proof:
  history_exchange: okx

pairs:
  - ETH/USDT
  - DOGE/USDT
  - SOL/USDT
  - LTC/USDT
  - ALGO/USDT

strategy:
  entry_style: sideways_accumulation
  ema_fast: 9
  ema_slow: 21
  ema_trend: 50
  rsi_period: 14
  atr_period: 14
  min_rsi: 42
  max_rsi: 68
  pullback_lookback: 6
  pullback_min_pct: 0.002
  pullback_max_pct: 0.035
  bounce_confirmation_pct: 0.0015
  volume_sma_period: 20
  min_volume_ratio: 0.85
  min_signal_score: 80
  recent_drop_lookback: 24
  max_recent_drop_pct: 8.0
  take_profit_atr_multiple: 1.4
  safety_exit_atr_multiple: 0.9
  max_active_minutes: 10080
  sideways_min_range_width_pct: 6
  sideways_max_range_width_pct: 24
  sideways_max_ema_slope_pct: 4
  sideways_min_range_position: 0.18
  sideways_max_range_position: 0.45
  sideways_min_support_touches: 2
  sideways_min_resistance_touches: 1
  sideways_min_rsi: 35
  sideways_max_rsi: 62
  sideways_min_volume_ratio: 0.7
  sideways_momentum_lookback: 96

optimizer:
  enabled: true
  quote_asset: USDT
  max_pairs: 30
  min_quote_volume_usdt: 100000
  min_last_price: 0.05
  min_volatility_pct: 1.8
  max_volatility_pct: 18.0
  loop_distances_pct:
    - 0.8
    - 1.0
    - 1.2
    - 1.5
    - 2.0
    - 2.5
  order_count: 10
  min_score: 80
  min_allocation_trades: 3
  max_active_bots: 4
  max_deployed_pct: 60
  max_coin_allocation_pct: 15
  excluded_base_assets:
    - USDT
    - USDC
    - DAI
    - PYUSD
    - EUR
    - USD
    - GBP
    - AUD
    - CAD
    - JPY
    - USDG
    - USDE
    - FIDD
    - RLUSD

