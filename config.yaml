exchange:
  id: kraken
  enable_rate_limit: true
  sandbox: false
  timeframe: 15m
  candle_limit: 120

telegram:
  bot_token: "PUT_TELEGRAM_BOT_TOKEN_HERE"
  chat_id: "PUT_TELEGRAM_CHAT_ID_HERE"

scheduler:
  interval_minutes: 15
  timezone: America/Los_Angeles

pair_discovery:
  enabled: true
  refresh_minutes: 60
  quote_asset: USDT
  min_quote_volume_usdt: 1250000
  min_last_price: 0.05
  min_volatility_pct: 1.8
  max_volatility_pct: 18.0
  max_pairs: 10
  preferred_base_assets:
    - BTC
    - ETH
    - DOGE
    - LINK
    - SOL
    - AVAX
    - XRP
    - ADA
    - BERA
    - XMR
  strategy_watchlist_base_assets:
    - BERA
    - DOGE
    - LINK
    - XRP
    - ADA
    - SOL
    - AVAX
    - XMR
  watchlist_min_quote_volume_usdt: 500000
  watchlist_min_volatility_pct: 1.2
  watchlist_max_volatility_pct: 22.0
  excluded_base_assets:
    - USDT
    - USDC
    - DAI
    - PYUSD
    - EUR
    - USD
    - GBP
    - AUD
    - CAD
    - JPY

morning_brief:
  enabled: true
  hour: 8
  minute: 0
  timezone: America/Los_Angeles
  headline_count: 3
  state_file: data/morning_brief_state.json
  headline_feed_url: https://www.coindesk.com/arc/outboundfeeds/rss/

paper_tracking:
  enabled: true
  hour: 20
  minute: 0
  timezone: America/Los_Angeles
  lookback_days: 7
  retention_days: 90
  state_file: data/paper_summary_state.json

pairs:
  - BTC/USDT
  - ETH/USDT
  - DOGE/USDT
  - LINK/USDT
  - SOL/USDT

strategy:
  ema_fast: 9
  ema_slow: 21
  ema_trend: 50
  rsi_period: 14
  atr_period: 14
  min_rsi: 42
  max_rsi: 68
  pullback_lookback: 6
  pullback_min_pct: 0.002
  pullback_max_pct: 0.035
  bounce_confirmation_pct: 0.0015
  volume_sma_period: 20
  min_volume_ratio: 0.85
  take_profit_atr_multiple: 1.4
  safety_exit_atr_multiple: 0.9
  max_active_minutes: 180

strategy_modes:
  - name: short
    market_type: sideways
    allowed_base_assets:
      - DOGE
      - LINK
      - SOL
      - AVAX
      - XRP
      - ADA
      - BERA
      - XMR
    market_type_rules:
      lookback: 96
      min_range_width_pct: 3.0
      max_range_width_pct: 9.0
      max_ema_slope_pct: 0.7
      min_support_touches: 4
      min_resistance_touches: 4
      min_range_position: 0.2
      max_range_position: 0.68
    strategy_overrides:
      pullback_lookback: 5
      pullback_max_pct: 0.028
      bounce_confirmation_pct: 0.0012
      min_volume_ratio: 0.8
      max_active_minutes: 240
    loop_settings:
      preset_name: Short-term
      order_distance_pct: 1.0
      order_count: 10
  - name: mid
    market_type: any
    strategy_overrides:
      pullback_lookback: 6
      pullback_max_pct: 0.035
      bounce_confirmation_pct: 0.0015
      min_volume_ratio: 0.85
      max_active_minutes: 180
    loop_settings:
      preset_name: Mid-term
      order_distance_pct: 1.5
      order_count: 10

loop_settings:
  preset_name: Mid-term
  order_distance_pct: 1.5
  order_count: 10
  assumed_round_trip_fee_pct: 0.2
  suggested_profit_pct: 0.006
  suggested_safety_exit_pct: 0.004
  max_loop_count: 3
  quote_amount_usdt: 100

storage:
  active_trades_file: data/active_trades.json
  trade_history_file: data/trade_history.csv
  log_file: logs/loopbots.log
