exchange:
  id: kraken
  enable_rate_limit: true
  sandbox: false
  timeframe: 15m
  candle_limit: 120

telegram:
  bot_token: "PUT_TELEGRAM_BOT_TOKEN_HERE"
  chat_id: "PUT_TELEGRAM_CHAT_ID_HERE"

scheduler:
  interval_minutes: 15
  timezone: America/Los_Angeles

pair_discovery:
  enabled: true
  refresh_minutes: 60
  quote_asset: USDT
  min_quote_volume_usdt: 1250000
  min_last_price: 0.05
  min_volatility_pct: 1.8
  max_volatility_pct: 18.0
  max_pairs: 20
  require_preferred_base_assets: false
  preferred_base_assets:
    - ETH
    - DOGE
    - SOL
    - LTC
    - ALGO
  strategy_watchlist_base_assets:
    - DOGE
    - SOL
    - ETH
    - LTC
    - ALGO
  watchlist_min_quote_volume_usdt: 100000
  watchlist_min_volatility_pct: 1.2
  watchlist_max_volatility_pct: 22.0
  excluded_base_assets:
    - USDT
    - USDC
    - DAI
    - PYUSD
    - EUR
    - USD
    - GBP
    - AUD
    - CAD
    - JPY
    - ADA
    - AVAX
    - BERA
    - XRP
    - XMR

morning_brief:
  enabled: true
  hour: 8
  minute: 0
  timezone: America/Los_Angeles
  headline_count: 3
  state_file: data/morning_brief_state.json
  headline_feed_url: https://www.coindesk.com/arc/outboundfeeds/rss/

paper_tracking:
  enabled: true
  lookback_days: 7
  retention_days: 30

dashboard:
  enabled: true
  host: 127.0.0.1
  port: 3000
  refresh_seconds: 30

pairs:
  - ETH/USDT
  - DOGE/USDT
  - SOL/USDT
  - LTC/USDT
  - ALGO/USDT

strategy:
  ema_fast: 9
  ema_slow: 21
  ema_trend: 50
  rsi_period: 14
  atr_period: 14
  min_rsi: 42
  max_rsi: 68
  pullback_lookback: 6
  pullback_min_pct: 0.002
  pullback_max_pct: 0.035
  bounce_confirmation_pct: 0.0015
  volume_sma_period: 20
  min_volume_ratio: 0.85
  min_signal_score: 80
  recent_drop_lookback: 24
  max_recent_drop_pct: 8.0
  take_profit_atr_multiple: 1.4
  safety_exit_atr_multiple: 0.9
  max_active_minutes: 180

optimizer:
  enabled: true
  quote_asset: USDT
  max_pairs: 30
  min_quote_volume_usdt: 100000
  min_last_price: 0.05
  min_volatility_pct: 1.8
  max_volatility_pct: 18.0
  loop_distances_pct:
    - 0.8
    - 1.0
    - 1.2
    - 1.5
    - 2.0
    - 2.5
  order_count: 10
  min_score: 80
  min_allocation_trades: 3
  max_active_bots: 4
  max_deployed_pct: 60
  max_coin_allocation_pct: 15
  excluded_base_assets:
    - USDT
    - USDC
    - DAI
    - PYUSD
    - EUR
    - USD
    - GBP
    - AUD
    - CAD
    - JPY
    - USDG
    - USDE
    - FIDD
    - RLUSD

strategy_modes:
  - name: doge_optimized
    market_type: any
    allowed_base_assets:
      - DOGE
    strategy_overrides:
      pullback_lookback: 6
      pullback_max_pct: 0.035
      bounce_confirmation_pct: 0.0015
      min_volume_ratio: 0.85
      max_active_minutes: 180
    loop_settings:
      preset_name: Optimized DOGE
      method_name: Trend pullback
      order_distance_pct: 1.2
      order_count: 10
  - name: sol_optimized
    market_type: any
    allowed_base_assets:
      - SOL
    strategy_overrides:
      pullback_lookback: 6
      pullback_max_pct: 0.035
      bounce_confirmation_pct: 0.0015
      min_volume_ratio: 0.85
      max_active_minutes: 180
    loop_settings:
      preset_name: Optimized SOL
      method_name: Trend pullback
      order_distance_pct: 2.0
      order_count: 10
  - name: eth_optimized
    market_type: any
    allowed_base_assets:
      - ETH
    strategy_overrides:
      pullback_lookback: 6
      pullback_max_pct: 0.035
      bounce_confirmation_pct: 0.0015
      min_volume_ratio: 0.85
      max_active_minutes: 180
    loop_settings:
      preset_name: Optimized ETH
      method_name: Trend pullback
      order_distance_pct: 2.0
      order_count: 10
  - name: ltc_optimized
    market_type: any
    allowed_base_assets:
      - LTC
    strategy_overrides:
      pullback_lookback: 6
      pullback_max_pct: 0.035
      bounce_confirmation_pct: 0.0015
      min_volume_ratio: 0.85
      max_active_minutes: 180
    loop_settings:
      preset_name: Optimized LTC
      method_name: Trend pullback
      order_distance_pct: 1.0
      order_count: 10
  - name: algo_optimized
    market_type: any
    allowed_base_assets:
      - ALGO
    strategy_overrides:
      pullback_lookback: 6
      pullback_max_pct: 0.035
      bounce_confirmation_pct: 0.0015
      min_volume_ratio: 0.85
      max_active_minutes: 180
    loop_settings:
      preset_name: Optimized ALGO
      method_name: Trend pullback
      order_distance_pct: 2.0
      order_count: 10
loop_settings:
  preset_name: Mid-term
  order_distance_pct: 1.5
  order_count: 10
  assumed_round_trip_fee_pct: 0.2
  suggested_profit_pct: 0.006
  suggested_safety_exit_pct: 0.004
  max_loop_count: 3
  quote_amount_usdt: 100

storage:
  active_trades_file: data/active_trades.json
  trade_history_file: data/trade_history.csv
  log_file: logs/loopbots.log
