exchange:
  id: kraken
  enable_rate_limit: true
  sandbox: false
  timeframe: 15m
  candle_limit: 120

telegram:
  bot_token: "PUT_TELEGRAM_BOT_TOKEN_HERE"
  chat_id: "PUT_TELEGRAM_CHAT_ID_HERE"

scheduler:
  interval_minutes: 15
  timezone: America/Los_Angeles

pair_discovery:
  enabled: true
  refresh_minutes: 60
  quote_asset: USDT
  min_quote_volume_usdt: 1250000
  min_last_price: 0.05
  min_volatility_pct: 1.8
  max_volatility_pct: 18.0
  max_pairs: 20
  require_preferred_base_assets: false
  preferred_base_assets:
    - ETH
    - DOGE
    - SOL
    - LTC
    - ALGO
  strategy_watchlist_base_assets:
    - DOGE
    - SOL
    - ETH
    - LTC
    - ALGO
  watchlist_min_quote_volume_usdt: 100000
  watchlist_min_volatility_pct: 1.2
  watchlist_max_volatility_pct: 22.0
  excluded_base_assets:
    - USDT
    - USDC
    - DAI
    - PYUSD
    - EUR
    - USD
    - GBP
    - AUD
    - CAD
    - JPY
    - ADA
    - AVAX
    - BERA
    - XRP
    - XMR

morning_brief:
  enabled: true
  hour: 8
  minute: 0
  timezone: America/Los_Angeles
  headline_count: 3
  state_file: data/morning_brief_state.json
  headline_feed_url: https://www.coindesk.com/arc/outboundfeeds/rss/

paper_tracking:
  enabled: true
  lookback_days: 7
  retention_days: 30

dashboard:
  enabled: true
  host: 127.0.0.1
  port: 3000
  refresh_seconds: 30

